<!doctype html>
<html lang="en" data-theme="light">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/svg+xml" href="/vite.svg" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description"
    content="AutoMark - AI-powered image annotation platform with YOLOv8 for detecting 1200+ object classes" />
  <meta name="theme-color" content="#ffffff" />
  <title>AutoMark - AI Image Annotation Platform</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap"
    rel="stylesheet">
  <style>
    /* Prevent flash of dark theme */
    html,
    body {
      background-color: #f8fafc !important;
    }
  </style>
  <script>
      // Reset theme to light if not explicitly set to dark
      if (localStorage.getItem('theme') !== 'dark') {
        localStorage.setItem('theme', 'light');
        document.documentElement.setAttribute('data-theme', 'light');
      }
  </script>
</head>

<body>
  <div id="root"></div>
  <script type="module" src="/src/main.jsx"></script>
</body>

</html>
